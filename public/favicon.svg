<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Background rounded square -->
  <rect width="64" height="64" rx="14" fill="#1e3a5f"/>

  <!-- Inner border accent -->
  <rect x="4" y="4" width="56" height="56" rx="10" fill="none" stroke="#3b82f6" stroke-width="2" opacity="0.5"/>

  <!-- Top decorative line -->
  <line x1="16" y1="12" x2="48" y2="12" stroke="#f59e0b" stroke-width="2.5" stroke-linecap="round"/>

  <!-- CV Text -->
  <text x="32" y="43" text-anchor="middle" font-family="Georgia, serif" font-size="30" font-weight="bold" fill="white" letter-spacing="2">CV</text>

  <!-- Bottom decorative line -->
  <line x1="16" y1="52" x2="48" y2="52" stroke="#f59e0b" stroke-width="2.5" stroke-linecap="round"/>
</svg>
